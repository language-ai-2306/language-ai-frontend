# Netlify config for the LanguageAI frontend (Vite app in ./frontend).
#
# The app calls the backend with RELATIVE URLs (/auth, /v1, /doctors, …). In dev
# these are proxied by Vite; in production Netlify proxies them to the backend
# via the rewrites below (status = 200 = proxy, so it's same-origin → no CORS).
#
# 👉 Replace BACKEND_URL below with your backend's public HTTPS URL, e.g.
#    https://api.yourdomain.com   (a raw http://IP:8080 may work but HTTPS is
#    strongly recommended — the site is served over HTTPS).

[build]
  base = "frontend"          # package.json lives in ./frontend
  command = "npm run build"  # runs tsc + vite build
  publish = "dist"           # → frontend/dist

[build.environment]
  NODE_VERSION = "20"

# --- Proxy the backend's route prefixes to the API (order matters: these must
#     come BEFORE the SPA catch-all). Query strings are forwarded automatically.
[[redirects]]
  from = "/auth/*"
  to = "https://nounally-malaceous-louise.ngrok-free.dev/auth/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/users/*"
  to = "https://nounally-malaceous-louise.ngrok-free.dev/users/:splat"
  status = 200
  force = true

# Bare "/doctors" (the therapist directory, GET /doctors?page=…) needs its OWN
# rule, and it must come BEFORE /doctors/* below. Otherwise /doctors/* matches it
# with an empty splat and proxies to ".../doctors/" — with a trailing slash. The
# backend's route is "/doctors", so FastAPI 307s to an ABSOLUTE ngrok URL; the
# browser follows that redirect cross-origin and, per the fetch spec, drops the
# Authorization header. The API then sees no token, 401s, and the app bounces the
# user to login. Any other collection endpoint called without a subpath needs the
# same treatment.
[[redirects]]
  from = "/doctors"
  to = "https://nounally-malaceous-louise.ngrok-free.dev/doctors"
  status = 200
  force = true

[[redirects]]
  from = "/doctors/*"
  to = "https://nounally-malaceous-louise.ngrok-free.dev/doctors/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/patient/*"
  to = "https://nounally-malaceous-louise.ngrok-free.dev/patient/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/v1/*"
  to = "https://nounally-malaceous-louise.ngrok-free.dev/v1/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/game/*"
  to = "https://nounally-malaceous-louise.ngrok-free.dev/game/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/phrases/*"
  to = "https://nounally-malaceous-louise.ngrok-free.dev/phrases/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/proficiency-test/*"
  to = "https://nounally-malaceous-louise.ngrok-free.dev/proficiency-test/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/admin/*"
  to = "https://nounally-malaceous-louise.ngrok-free.dev/admin/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/health"
  to = "https://nounally-malaceous-louise.ngrok-free.dev/health"
  status = 200
  force = true

# --- SPA fallback: every other path serves the app shell. MUST be last.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
